name: abitur
description: "Behalte deine Noten im Blick!"
publish_to: 'none'

version: 0.0.1-alpha.4

environment:
  sdk: ^3.5.1

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  percent_indicator: ^4.2.4
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  fl_chart: ^0.69.2
  provider: ^6.1.2
  table_calendar: ^3.1.3
  intl: ^0.20.2
  flutter_colorpicker: ^1.1.0
  url_launcher: ^6.3.1
  path_provider: ^2.1.5
  share_plus: ^10.1.4
  file_picker: ^8.1.7
  shared_preferences: ^2.5.5
  http: ^1.6.0
  device_calendar: ^4.3.3
  flutter_localization: ^0.4.0
  flutter_local_notifications: ^18.0.1
  permission_handler: ^11.3.0
  timezone: ^0.9.4
  synchronized: ^3.4.0+1
  app_settings: ^6.1.1
  static_shortcuts: ^0.0.2
  package_info_plus: ^9.0.1
  crypto: ^3.0.7
  collection: ^1.19.1
  google_fonts: ^8.1.0

  # review
  just_audio: ^0.10.4
  vibration: ^3.1.8
  wakelock_plus: ^1.5.2

  # money
  in_app_purchase: ^3.2.3
  sqflite: ^2.4.2+1
  path: ^1.9.1

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  build_runner: ^2.4.13 # dart run build_runner build
  hive_generator: ^2.0.1
  launcher_name: ^1.0.2
  flutter_launcher_icons: ^0.14.3
  custom_lint: ^0.6.4

flutter:

  uses-material-design: true

  assets:
    - assets/icon.png
    - assets/abitur_icon.png
    - assets/mp3/embrace-364091.mp3

launcher_name:
  default: "Abitur"

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/icon.png"
  adaptive_icon_foreground: "assets/icon.png" # Set the foreground image (same or different from image_path)
  adaptive_icon_background: "#B3E9FE"
  adaptive_icon_foreground_inset: 18
  adaptive_icon_monochrome: "assets/icon.png"
  remove_alpha_ios: true
  min_sdk_android: 21

static_shortcuts:
  newEvaluation:
    icon: "assets/add_icon.png"
    intent: "newEvaluation"
    targetClass: "com.OJCreator.abitur.MainActivity"
    targetPackage: "com.OJCreator.abitur"
    label: "Neue Prüfung"
